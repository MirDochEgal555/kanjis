<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>sidequest</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1115;
      --panel: rgba(20, 24, 30, 0.92);
      --border: rgba(255, 255, 255, 0.1);
      --text: #f2f4f7;
      --muted: #96a0ae;
      --accent: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 26%),
        linear-gradient(180deg, #101318 0%, #0a0c10 100%);
      color: var(--text);
      font-family: "Aptos", "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .quest-panel {
      width: min(760px, 100%);
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
    }

    .eyebrow,
    .quest-meta {
      margin: 0;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 0.76rem;
    }

    h1 {
      margin: 10px 0 12px;
      font-size: clamp(2.1rem, 7vw, 4rem);
      line-height: 0.95;
    }

    .quest-summary,
    .quest-instructions {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 1.02rem;
    }

    .quest-card {
      margin-top: 24px;
      padding: 22px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
    }

    .quest-title {
      margin: 0 0 12px;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      line-height: 1.05;
    }

    .quest-line {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .quest-line strong {
      color: var(--accent);
    }

    .quest-footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .quest-chip {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      font-size: 0.9rem;
    }

    .quest-note {
      margin-top: 18px;
      color: rgba(255, 255, 255, 0.24);
      font-size: 0.74rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .quest-panel {
        padding: 20px;
        border-radius: 22px;
      }

      .quest-card {
        padding: 18px;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="quest-panel">
    <p class="eyebrow">Archived Sidequest Feed</p>
    <h1>One quest. No map.</h1>
    <p class="quest-summary">
      This page keeps a vault of 100 hand-written sidequests. Each visit reveals only one.
    </p>

    <section class="quest-card" aria-live="polite">
      <p id="quest-meta" class="quest-meta"></p>
      <h2 id="quest-title" class="quest-title"></h2>
      <p id="quest-line" class="quest-line"></p>
      <div class="quest-footer">
        <span id="quest-reward" class="quest-chip"></span>
        <span id="quest-risk" class="quest-chip"></span>
      </div>
    </section>

    <p class="quest-note">No link points here.</p>
  </main>
